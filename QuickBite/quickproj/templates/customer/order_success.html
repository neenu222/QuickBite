{% extends "customer/customer_base.html" %}
{% block content %}

<style>
    :root {
        --primary-orange: #ff6b35;
        --secondary-orange: #ff8c42;
        --dark-orange: #e85d2e;
        --light-orange: #fff5f2;
        --accent-orange: #ffb088;
    }

    /* Success Container */
    .success-container {
        max-width: 700px;
        margin: 3rem auto;
        text-align: center;
    }

    /* Success Card */
    .success-card {
        background: white;
        border-radius: 30px;
        padding: 4rem 3rem;
        box-shadow: 0 10px 40px rgba(255, 107, 53, 0.2);
        border: 3px solid var(--light-orange);
        animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Success Icon */
    .success-icon {
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, var(--primary-orange) 0%, var(--secondary-orange) 100%);
        border-radius: 50%;
        margin: 0 auto 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-10px);
        }
    }

    /* Success Header */
    .success-card h2 {
        color: var(--dark-orange);
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        text-shadow: 1px 1px 2px rgba(255, 107, 53, 0.1);
    }

    /* Success Message */
    .success-message {
        background: var(--light-orange);
        padding: 1.5rem 2rem;
        border-radius: 20px;
        color: #555;
        font-size: 1.2rem;
        line-height: 1.6;
        margin-bottom: 2.5rem;
        border-left: 5px solid var(--primary-orange);
    }

    .success-message::before {
        content: '✓ ';
        color: var(--primary-orange);
        font-size: 1.5rem;
        font-weight: bold;
        margin-right: 0.5rem;
    }

    /* Action Buttons */
    .success-actions {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        margin-top: 2rem;
    }

    .btn-view-orders {
        background: linear-gradient(135deg, var(--primary-orange) 0%, var(--secondary-orange) 100%);
        color: white;
        padding: 1.25rem 3rem;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 700;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        box-shadow: 0 6px 20px rgba(255, 107, 53, 0.3);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
    }

    .btn-view-orders:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        color: white;
    }

    .btn-view-orders::before {
        content: '📦';
        font-size: 1.5rem;
    }

    .btn-continue-shopping {
        background: white;
        color: var(--primary-orange);
        padding: 1.25rem 3rem;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 700;
        font-size: 1.2rem;
        border: 3px solid var(--primary-orange);
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
    }

    .btn-continue-shopping:hover {
        background: var(--primary-orange);
        color: white;
        transform: translateY(-3px);
    }

    .btn-continue-shopping::before {
        content: '🛍️';
        font-size: 1.5rem;
    }

    /* Decorative Elements */
    .confetti {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
    }

    .confetti-piece {
        position: absolute;
        width: 10px;
        height: 10px;
        background: var(--primary-orange);
        opacity: 0;
        animation: confetti-fall 3s ease-out forwards;
    }

    @keyframes confetti-fall {
        0% {
            opacity: 1;
            transform: translateY(-100vh) rotate(0deg);
        }

        100% {
            opacity: 0;
            transform: translateY(100vh) rotate(720deg);
        }
    }

    /* Order Details Preview */
    .order-preview {
        background: linear-gradient(135deg, var(--light-orange) 0%, #ffffff 100%);
        padding: 1.5rem;
        border-radius: 15px;
        margin: 2rem 0;
        border: 2px dashed var(--accent-orange);
    }

    .order-preview-text {
        color: var(--dark-orange);
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0;
    }

    .order-preview-text::before {
        content: '👨‍🍳 ';
        font-size: 1.5rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .success-card {
            padding: 3rem 2rem;
        }

        .success-card h2 {
            font-size: 2rem;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            font-size: 3rem;
        }

        .btn-view-orders,
        .btn-continue-shopping {
            padding: 1rem 2rem;
            font-size: 1.1rem;
        }
    }
</style>

<div class="success-container">
    <div class="success-card">
        <div class="success-icon">
            🎉
        </div>

        <h2>Order Placed Successfully 🎉</h2>

        <div class="success-message">
            <p>Thank you for your order! Your food is being prepared.</p>
        </div>

        <div class="order-preview">
            <p class="order-preview-text">Our chefs are preparing your delicious meal!</p>
        </div>

        <div class="success-actions">
            <a href="{% url 'customer_orders' %}" class="btn-view-orders">View My Orders</a>
            <a href="{% url 'customer_home' %}" class="btn-continue-shopping">Continue Shopping</a>
        </div>
    </div>
</div>

<!-- Confetti Effect -->
<div class="confetti">
    <div class="confetti-piece" style="left: 10%; animation-delay: 0s; background: var(--primary-orange);"></div>
    <div class="confetti-piece" style="left: 20%; animation-delay: 0.2s; background: var(--secondary-orange);"></div>
    <div class="confetti-piece" style="left: 30%; animation-delay: 0.4s; background: var(--accent-orange);"></div>
    <div class="confetti-piece" style="left: 40%; animation-delay: 0.1s; background: var(--primary-orange);"></div>
    <div class="confetti-piece" style="left: 50%; animation-delay: 0.3s; background: var(--secondary-orange);"></div>
    <div class="confetti-piece" style="left: 60%; animation-delay: 0.5s; background: var(--accent-orange);"></div>
    <div class="confetti-piece" style="left: 70%; animation-delay: 0.2s; background: var(--primary-orange);"></div>
    <div class="confetti-piece" style="left: 80%; animation-delay: 0.4s; background: var(--secondary-orange);"></div>
    <div class="confetti-piece" style="left: 90%; animation-delay: 0.1s; background: var(--accent-orange);"></div>
</div>

{% endblock %}
